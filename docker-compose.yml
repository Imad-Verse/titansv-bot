version: '3.8'

services:
  bot:
    build: .
    container_name: titansv_bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./downloads:/app/downloads
      - ./cookies:/app/cookies
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
